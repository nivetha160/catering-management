<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Royal Catering - Select Your Menu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
    --primary: #8b0000;
    --secondary: #ff9933;
    --bg: #fff8f0;
    --white: #ffffff;
    --special: #ffd700; /* Gold color for extra special menu */
  }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 0;
    color: #333;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    text-align: center;
  }

  h1 { color: var(--primary); margin-bottom: 10px; }
  .subtitle { margin-bottom: 30px; color: #666; }

  .controls {
    background: var(--white);
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    margin-bottom: 40px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
    align-items: flex-end;
  }

  .control-group { text-align: left; }
  .control-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #555; }

  select, input, textarea {
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 16px;
    outline: none;
  }

  #menuGrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 25px;
  }

  .card {
    background: var(--white);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
    cursor: pointer;
    border: 3px solid transparent;
    text-align: left;
  }

  .card.selected {
    border-color: var(--secondary);
    transform: translateY(-5px);
    background: #fffcf5;
  }

  /* Styling for the Extra Special Menu */
  .card.special-menu {
    border: 2px dashed var(--special);
    background: #fffef0;
  }
  .special-badge {
    background: var(--special);
    color: #000;
    padding: 5px 10px;
    font-size: 10px;
    font-weight: bold;
    border-radius: 5px;
    display: inline-block;
    margin-bottom: 5px;
  }

  .card img { width: 100%; height: 180px; object-fit: cover; }
  .card-content { padding: 20px; }
  .card h3 { margin: 0 0 10px 0; color: var(--primary); }
  .price { font-size: 1.2rem; font-weight: bold; color: #e67e22; margin-bottom: 15px; }
  
  .item-list {
    font-size: 0.95rem;
    line-height: 1.6;
    color: #555;
    border-top: 1px dashed #eee;
    padding-top: 10px;
  }

  .proceed-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: linear-gradient(45deg, var(--primary), #ff4d4d);
    color: white;
    border: none;
    padding: 15px 40px;
    border-radius: 50px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(139, 0, 0, 0.3);
    transition: 0.3s;
    z-index: 1000;
  }

  .proceed-btn:hover { transform: scale(1.05); }

  @media (max-width: 600px) {
    .proceed-btn { width: 90%; right: 5%; left: 5%; bottom: 20px; }
  }
</style>
</head>

<body>

<div class="container">
  <h1>🍽 Royal Catering Menu</h1>
  <p class="subtitle">Pick a package and specify the number of guests.</p>

  <div class="controls">
    <div class="control-group">
      <label>FILTER BY OCCASION</label>
      <select id="occasionSelect" onchange="filterMenus()">
        <option value="All">All Packages</option>
        <option value="Special">✨ Extra Special</option>
        <option>Wedding</option>
        <option>Reception</option>
        <option>Birthday</option>
        <option>Corporate</option>
        <option>Engagement</option>
        <option>House Warming</option>
        <option>Baby Shower</option>
        <option>Anniversary</option>
        <option>Temple Function</option>
        <option>Funeral</option>
        <option>Get Together</option>
      </select>
    </div>

    <div class="control-group">
      <label>NO. OF PLATES</label>
      <input type="number" id="plateCount" placeholder="0" min="1">
    </div>

    <div class="control-group">
      <label>SPECIAL INSTRUCTIONS</label>
      <input type="text" id="extraNote" placeholder="e.g. Less spicy, extra sweet" style="width: 250px;">
    </div>
  </div>

  <div id="menuGrid"></div>

  <button class="proceed-btn" onclick="handleProceed()">Generate Bill →</button>
</div>

<script>
const menuData = [
  { 
    occasion: "Special", 
    title: "Royal Maharaja Signature", 
    price: 850, 
    img: "https://images.unsplash.com/photo-1589302168068-964664d93dc0", 
    isSpecial: true,
    items: ["Welcome Drink (Fruit Punch)", "Starter: Paneer Tikka & Gobi 65", "Main: Hyderabadi Dum Biryani", "Live Jalebi Counter", "Premium Dry Fruit Ice Cream"] 
  },
  { occasion: "Wedding", title: "Royal Wedding Feast", price: 450, img: "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4", items: ["Veg Biryani", "Paneer Butter Masala", "Avial", "Poriyal", "Sweet", "Payasam"] },
  { occasion: "Reception", title: "Grand Reception", price: 520, img: "https://images.unsplash.com/photo-1544145945-f90425340c7e", items: ["Chicken Biryani", "Butter Chicken", "Naan", "Salad", "Dessert"] },
  { occasion: "Birthday", title: "Kids Birthday Special", price: 300, img: "https://images.unsplash.com/photo-1602631985686-1bb0e6a8696e", items: ["Fried Rice", "Chicken 65", "Noodles", "Ice Cream", "Cake"] },
  { occasion: "Corporate", title: "Executive Lunch", price: 280, img: "https://images.unsplash.com/photo-1525351484163-7529414344d8", items: ["Mini Meals", "Rice", "Veg Curry", "Curd", "Sweet"] },
  { occasion: "Engagement", title: "Engagement Special", price: 380, img: "https://images.unsplash.com/photo-1555243896-c709bfa0b564", items: ["Veg Meals", "Chapati", "Paneer Curry", "Sweet"] },
  { occasion: "House Warming", title: "Traditional Grihapravesh", price: 320, img: "https://images.unsplash.com/photo-1592861956120-e524fc739696", items: ["Full Meals", "Sambar", "Rasam", "Payasam"] },
  { occasion: "Baby Shower", title: "Seemantham Menu", price: 350, img: "https://images.unsplash.com/photo-1504674900247-0877df9cc836", items: ["Veg Meals", "Chapati", "Paneer Curry", "Sweet", "Payasam"] },
  { occasion: "Anniversary", title: "Anniversary Dinner", price: 400, img: "https://images.unsplash.com/photo-1498654896293-37aacf113fd9", items: ["Veg Biryani", "Paneer Curry", "Naan", "Salad", "Dessert"] },
  { occasion: "Temple Function", title: "Sathya Sai Special", price: 250, img:"https://images.unsplash.com/photo-1516684669134-de6f7c473a2a?auto=format&fit=crop&q=80&w=400", items: ["Sambar Rice", "Curd Rice", "Poriyal", "Pickle", "Sweet"] },
  { occasion: "Funeral", title: "Simple Memorial Menu", price: 200, img: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c", items: ["Simple Meals", "Rice", "Sambar", "Rasam", "Curd"] },
  { occasion: "Get Together", title: "Party Mix", price: 320, img: "https://images.unsplash.com/photo-1504754524776-8f4f37790ca0", items: ["Fried Rice", "Chicken 65", "Noodles", "Salad", "Ice Cream"] }
];

let selectedIdx = null;

function render(filter = "All") {
  const grid = document.getElementById("menuGrid");
  grid.innerHTML = "";
  
  menuData.forEach((m, index) => {
    if (filter === "All" || m.occasion === filter) {
      const isSelected = selectedIdx === index ? 'selected' : '';
      const specialClass = m.isSpecial ? 'special-menu' : '';
      
      grid.innerHTML += `
        <div class="card ${isSelected} ${specialClass}" onclick="selectCard(${index})">
          <img src="${m.img}" onerror="this.src='https://via.placeholder.com/400x200?text=Catering+Menu'">
          <div class="card-content">
            ${m.isSpecial ? '<span class="special-badge">RECOMMENDED BY CHEF</span>' : ''}
            <h3>${m.title}</h3>
            <p class="price">₹${m.price} <small>/ plate</small></p>
            <div class="item-list">
              ${m.items.map(item => `• ${item}`).join("<br>")}
            </div>
          </div>
        </div>
      `;
    }
  });
}

function selectCard(index) {
  selectedIdx = index;
  render(document.getElementById("occasionSelect").value);
}

function filterMenus() {
  selectedIdx = null;
  render(document.getElementById("occasionSelect").value);
}

function handleProceed() {
  const plates = document.getElementById("plateCount").value;
  const note = document.getElementById("extraNote").value;
  
  if (selectedIdx === null) {
    alert("Please select a menu card first!");
    return;
  }
  
  if (!plates || plates < 1) {
    alert("Please enter the number of plates.");
    return;
  }

  const selectedMenu = menuData[selectedIdx];
  const order = {
    menuName: selectedMenu.title,
    pricePerPlate: selectedMenu.price,
    quantity: plates,
    specialNote: note || "None",
    totalAmount: selectedMenu.price * plates
  };

  localStorage.setItem("orderData", JSON.stringify(order));
  window.location.href = "bill.html";
}

render();
</script>

</body>
</html>
