<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Form - Royal Catering</title>
  <style>
    * { box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #ffe6e6, #fff5e6);
      text-align: center;
      padding: 50px 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
    }

    h2 { color: #8b0000; margin-bottom: 20px; }

    #customer-form {
      background: white;
      padding: 30px;
      margin: auto;
      max-width: 450px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: left; /* Align labels to the left */
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      color: #555;
      font-size: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ddd;
      outline: none;
      transition: border-color 0.3s;
    }

    input:focus, textarea:focus {
      border-color: #ff4d4d;
      background-color: #fff9f9;
    }

    .btn {
      width: 100%;
      margin-top: 30px;
      padding: 15px;
      background: linear-gradient(45deg, #ff4d4d, #ff9933);
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255, 77, 77, 0.4);
    }
  </style>
</head>
<body>

<h2>Event Booking Details</h2>

<section id="customer-form">
  <label for="name">Full Name</label>
  <input type="text" id="name" placeholder="John Doe">

  <label for="phone">Mobile Number</label>
  <input type="tel" id="phone" placeholder="9876543210" maxlength="10">

  <label for="aadhar">Aadhar Number (12 Digits)</label>
  <input type="text" id="aadhar" placeholder="123456789012" maxlength="12">

  <label for="date">Event Date</label>
  <input type="date" id="date">

  <label for="address">Event Location</label>
  <textarea id="address" rows="3" placeholder="Street name, Venue, City..."></textarea>

  <button class="btn" onclick="goMenu()">Proceed to Select Menu</button>
</section>

<script>
  // Set minimum date to today so users can't book the past
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('date').setAttribute('min', today);

  function goMenu() {
    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const aadhar = document.getElementById("aadhar").value.trim();
    const date = document.getElementById("date").value;
    const address = document.getElementById("address").value.trim();

    // Validations
    if (!name || !phone || !aadhar || !date || !address) {
      alert("Please fill in all the details to continue.");
      return;
    }

    if (!/^\d{10}$/.test(phone)) {
      alert("Please enter a valid 10-digit mobile number.");
      return;
    }

    if (!/^\d{12}$/.test(aadhar)) {
      alert("Please enter a valid 12-digit Aadhar number.");
      return;
    }

    // Save to LocalStorage
    const customer = { name, phone, aadhar, date, address };
    localStorage.setItem("customerDetails", JSON.stringify(customer));

    // Redirect
    window.location.href = "menu.html";
  }
</script>

</body>
</html>
