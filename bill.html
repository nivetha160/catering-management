<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Royal Catering - Final Invoice</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #fbe9e7; margin: 0; padding: 20px; display: flex; justify-content: center; }
  .main { width: 100%; max-width: 650px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; }
  h1 { text-align: center; color: #8b0000; margin-bottom: 25px; border-bottom: 2px solid #fbe9e7; padding-bottom: 10px; }
  
  .section-title { font-size: 14px; font-weight: bold; color: #8b0000; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
  
  input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; background: #fafafa; font-size: 14px; }
  
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
  th { background: #fff3e0; color: #e65100; }
  
  .total-container { text-align: right; margin-top: 20px; padding: 15px; background: #fdf5e6; border-radius: 10px; line-height: 1.8; }
  .grand-total { font-size: 22px; font-weight: bold; color: #8b0000; border-top: 1px solid #ddd; margin-top: 10px; padding-top: 5px; }

  .btn { width: 100%; padding: 15px; margin-top: 12px; border: none; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
  .back { background: #f5f5f5; color: #666; }
  .whatsapp { background: #25D366; color: white; }
  .pay { background: #1976d2; color: white; }
  .btn:hover { opacity: 0.9; transform: translateY(-2px); }

  /* QR Modal Styling */
  #qrModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 2000; text-align: center; width: 280px; }
  #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1999; }
  .qr-img { width: 200px; height: 200px; margin: 15px 0; border: 1px solid #eee; }
</style>
</head>

<body>

<div id="overlay"></div>
<div id="qrModal">
  <h3 style="color:#8b0000; margin:0;">Scan to Pay</h3>
  <div id="qrContainer"></div>
  <p id="qrPrice" style="font-weight:bold; font-size:18px; margin:10px 0; color:#333;"></p>
  <button class="btn back" onclick="closeQR()">Close</button>
</div>

<div class="main">
  <h1>🧾 Final Invoice</h1>

  <div class="section-title">Customer Information</div>
  <input type="text" id="name" placeholder="Name">
  <input type="tel" id="phone" placeholder="Mobile Number">
  <input type="text" id="aadhar" placeholder="Aadhar Number">
  <input type="date" id="date">
  <textarea id="address" rows="2" placeholder="Event Address"></textarea>

  <div class="section-title">Order Summary</div>
  <table>
    <thead>
      <tr>
        <th>Item</th>
        <th>Price</th>
        <th>Qty</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="billBody"></tbody>
  </table>

  <div class="total-container">
    <div>Subtotal: <span id="subtotal">₹0</span></div>
    <div>GST (5%): <span id="gst">₹0</span></div>
    <div class="grand-total" id="grandTotal">Grand Total: ₹0</div>
    <div id="specialNoteDisplay" style="font-size: 13px; color: #d35400; font-weight: bold; margin-top: 5px;"></div>
  </div>

  <button class="btn whatsapp" id="whatsappBtn">📲 Confirm Order via WhatsApp</button>
  <button class="btn pay" id="payBtn">💳 Pay Now (GPay / UPI)</button>
  <button class="btn back" id="backBtn">⬅ Change Menu</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA4D2qk_tz54EAlSy6IVwYy19lVsOVK_Z4",
    authDomain: "royal-catering-b3871.firebaseapp.com",
    databaseURL: "https://royal-catering-b3871-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "royal-catering-b3871",
    storageBucket: "royal-catering-b3871.appspot.com",
    messagingSenderId: "297186063732",
    appId: "1:297186063732:web:82d7703fc37a0bd0876821"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const customer = JSON.parse(localStorage.getItem("customerDetails")) || {};
  const order = JSON.parse(localStorage.getItem("orderData")) || null;
  const whatsappNumber = "919074560160";

  let finalAmount = 0;

  // Load Customer Data
  if(customer) {
    document.getElementById("name").value = customer.name || "";
    document.getElementById("phone").value = customer.phone || "";
    document.getElementById("aadhar").value = customer.aadhar || "";
    document.getElementById("date").value = customer.date || "";
    document.getElementById("address").value = customer.address || "";
  }

  // Calculate and Display Order
  if(order) {
    const sub = order.totalAmount;
    const tax = Math.round(sub * 0.05); // 5% GST
    finalAmount = sub + tax;

    document.getElementById("billBody").innerHTML = `
      <tr>
        <td>${order.menuName}</td>
        <td>₹${order.pricePerPlate}</td>
        <td>${order.quantity}</td>
        <td>₹${sub}</td>
      </tr>
    `;

    document.getElementById("subtotal").innerText = "₹" + sub;
    document.getElementById("gst").innerText = "₹" + tax;
    document.getElementById("grandTotal").innerText = "Grand Total: ₹" + finalAmount;
    document.getElementById("specialNoteDisplay").innerText = "Special Note: " + (order.specialNote || "None");
  }

  // QR Modal Logic
  window.closeQR = function() {
    document.getElementById("qrModal").style.display = "none";
    document.getElementById("overlay").style.display = "none";
  }

  // Pay Button Logic
  document.getElementById("payBtn").onclick = () => {
    const upiId = "nivethait3@oksbi";
    const upiUrl = `upi://pay?pa=${upiId}&pn=RoyalCatering&am=${finalAmount}&cu=INR`;
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    if (isMobile) {
      window.location.href = upiUrl;
    } else {
      const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiUrl)}`;
      document.getElementById("qrContainer").innerHTML = `<img src="${qrImageUrl}" class="qr-img">`;
      document.getElementById("qrPrice").innerText = "Total: ₹" + finalAmount;
      document.getElementById("qrModal").style.display = "block";
      document.getElementById("overlay").style.display = "block";
    }
  };

  // WhatsApp and Firebase
  document.getElementById("whatsappBtn").onclick = () => {
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const aadhar = document.getElementById("aadhar").value;
    const date = document.getElementById("date").value;
    const address = document.getElementById("address").value;

    if(!name || !phone || !aadhar) {
      alert("Please ensure all customer details are filled!");
      return;
    }

    let msg = `*ROYAL CATERING ORDER*%0A` +
              `--------------------------%0A` +
              `*Customer:* ${name}%0A` +
              `*Phone:* ${phone}%0A` +
              `*Date:* ${date}%0A` +
              `*Menu:* ${order.menuName}%0A` +
              `*Quantity:* ${order.quantity} plates%0A` +
              `*Note:* ${order.specialNote}%0A` +
              `--------------------------%0A` +
              `*Subtotal:* ₹${order.totalAmount}%0A` +
              `*GST (5%):* ₹${Math.round(order.totalAmount * 0.05)}%0A` +
              `*GRAND TOTAL:* ₹${finalAmount}`;

    push(ref(db, "orders"), {
      customer: name,
      phone: phone,
      aadhar: aadhar,
      eventDate: date,
      order: order,
      tax: Math.round(order.totalAmount * 0.05),
      totalBill: finalAmount,
      timestamp: new Date().toLocaleString()
    }).then(() => {
      window.open(`https://wa.me/${whatsappNumber}?text=${msg}`);
    });
  };

  document.getElementById("backBtn").onclick = () => window.location.href = "menu.html";
</script>

</body>
</html>
